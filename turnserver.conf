# =========================================================================
# Paloonies Coturn TURN Server Configuration (Phase 3)
# =========================================================================
#
# This configuration acts as a relay fallback when direct peer-to-peer (P2P)
# and STUN connections fail (e.g. when both devices sit behind strict/symmetric NATs).
#
# -------------------------------------------------------------------------
# HOW TO RUN THIS TURN SERVER:
# -------------------------------------------------------------------------
#
# Option A: Run via Docker (Recommended, Zero Installation)
#   Run the following command in your terminal:
#
#   docker run -d --name paloonies-turn \
#     -p 3478:3478 -p 3478:3478/udp -p 5349:5349 -p 5349:5349/udp \
#     -v $(pwd)/turnserver.conf:/etc/coturn/turnserver.conf \
#     coturn/coturn
#
# Option B: Run natively on Linux/macOS
#   1. Install coturn (e.g. `brew install coturn` on Mac, `sudo apt install coturn` on Ubuntu).
#   2. Start coturn using this configuration file:
#      turnserver -c turnserver.conf
#
# -------------------------------------------------------------------------
# HOW TO WIRE INTO LINKUP CLIENT:
# -------------------------------------------------------------------------
#
#   1. Start the LinkUp app.
#   2. Click the gear settings icon in the top-right corner.
#   3. Enter your TURN Server URL:
#      turn:YOUR_SERVER_PUBLIC_IP:3478
#   4. Enter username: linkupuser
#   5. Enter password: linkuppassword
#   6. Click "Save Settings".
#
# =========================================================================

# Connection Ports
listening-port=3478
tls-listening-port=5349

# Traversal Interfaces
fingerprint
lt-cred-mech

# Static pairing user credentials
# Format: user=username:password
user=linkupuser:linkuppassword

# Authentication domain/realm
realm=linkup.local

# Run options
verbose
